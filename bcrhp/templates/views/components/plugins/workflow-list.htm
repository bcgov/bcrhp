<div class="workflow-select-plugin">
    <div>
        <h2 class="workflow-select-card-container-title">Local Government submissions</h2>
    </div>
    <div class="workflow-select-card-container">
        <a data-bind="attr: {href: '/bcrhp/submissions', title: 'Local Government submissions'}" href="#">
            <div data-bind="style: {'background-color': '#8bc3eb'}" class="workflow-select-card dashboard-card">
                <h4 class="workflow-select-title" data-bind="text: 'Local Government submissions'"></h4>
                <div data-bind="style: {'background-color': 'lightBlue'}" class="workflow-select-wf-circle">
                    <span><i data-bind="attr:{class: ('fa fa-folder workflow-select-wf-icon')}"></i></span>
                </div>
                <p data-bind="text: 'Local Government submissions'" class="workflow-select-desc"></p>
            </div>
        </a>
    </div>
</div>
