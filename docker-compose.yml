name: bcrhp
services:
  bcrhp:
    container_name:  bcrhp
    platform: ${DOCKER_HOST_PLATFORM:-linux}
    image: bcgov/bcrhp
    build:
      context: ..
      dockerfile: bcrhp/Dockerfile
      args:
        # Set this to true in the .env if debugging with PyCharm
        INSTALL_PYCHARM_DEBUG: ${INSTALL_PYCHARM_DEBUG:-false}
    environment:
      PYCHARM_DEBUG: ${PYCHARM_DEBUG:-false}
    command: run_arches
    volumes:
      - ../arches/:/web_root/arches
      - ./:/web_root/bcrhp
      - ../bcgov-arches-common/:/web_root/bcgov-arches-common
      - ../arches-component-lab/:/web_root/arches-component-lab
      - ../arches-querysets/:/web_root/arches-querysets
    env_file:
      - ./.env
      - ./docker/docker.dev.env
    ports:
      - 8025:8000
#      - 5678:5678
      - 443:443
      - 5173:5173
    stdin_open: true
    tty: true

  bcrhp-proxy:
    container_name: bcrhp-proxy
    image: nginx:1.25-alpine
    depends_on:
      - bcrhp
    ports:
      - "80:80"          # expose the proxy on host:81
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  bcrhp-jupyter:
    container_name: bcrhp-jupyter
    image: bcgov/bcrhp-jupyter          # reuse the same image
    build:
      context: ..
      dockerfile: bcrhp/Dockerfile
      target: jupyter
    volumes:
      - ../arches/:/web_root/arches
      - ./:/web_root/bcrhp
      - ../bcgov-arches-common/:/web_root/bcgov-arches-common
      - ../arches-component-lab/:/web_root/arches-component-lab
      - ../arches-querysets/:/web_root/arches-querysets
    env_file:
      - ./docker/env_file.env
    ports:
      - 8888:8888
    depends_on:
      - bcrhp
    stdin_open: true
    tty: true

networks:
  default:
    external: true
    name: arches7-5-2-dev


volumes:
  arches-log-bcrhp:
  arches-static-bcrhp: