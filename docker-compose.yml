name: bcrhp7-6
services:
  bcrhp:
    container_name:  bcrhp7-6
    image: bcgov/bcrhp7-6
    build:
      context: ..
      dockerfile: bcrhp/Dockerfile
    command: run_arches
    volumes:
      - ../arches/:/web_root/arches
      - ./:/web_root/bcrhp
      - ../bcgov-arches-common/:/web_root/bcgov-arches-common
      - ../arches-component-lab/:/web_root/arches-component-lab
      - ../arches-querysets/:/web_root/arches-querysets
    env_file:
      - ./docker/env_file.env
    ports:
      - 8025:8000
      - 5688:5678
      - 443:443
      - 5173:5173
    stdin_open: true
    tty: true

  bcrhp-proxy:
    container_name: bcrhp-proxy7-6
    image: nginx:1.25-alpine
    depends_on:
      - bcrhp
    ports:
      - "80:80"          # expose the proxy on host:81
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  bcrhp-jupyter:
    container_name: bcrhp-jupyter
    image: bcgov/bcrhp-jupyter          # reuse the same image
    build:
      context: ..
      dockerfile: bcrhp/Dockerfile
      target: jupyter
    volumes:
      - ../arches/:/web_root/arches
      - ./:/web_root/bcrhp
      - ../bcgov-arches-common/:/web_root/bcgov-arches-common
      - ../arches-component-lab/:/web_root/arches-component-lab
      - ../arches-querysets/:/web_root/arches-querysets
    env_file:
      - ./docker/env_file.env
    ports:
      - 8888:8888
    depends_on:
      - bcrhp
    stdin_open: true
    tty: true

networks:
  default:
    external: true
    name: arches7-5-2-dev


volumes:
  arches-log-bcrhp7-6:
  arches-static-bcrhp7-6: