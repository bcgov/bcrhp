paths:
  /bcrhp/api/external/bc_heritage_function/:
    get:
      operationId: bc_heritage_function_list
      description: |-
        GET the requesting user's BC Heritage Function resources.

        Read-only and owner-scoped: returns only the resources the user created.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - 'External: bc_heritage_function'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBcHeritageFunctionList'
          description: ''
  /bcrhp/api/external/bc_heritage_function/{id}/:
    get:
      operationId: bc_heritage_function_retrieve
      description: |-
        GET a BC Heritage Function resource and its nested tiles.

        Read-only, and scoped to the requesting user's own resources: requesting
        one created by another user returns 404.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 'External: bc_heritage_function'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BcHeritageFunction'
          description: ''
