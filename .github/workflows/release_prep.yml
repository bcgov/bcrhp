name: Prepare release

on:
  push:
    branches:
      - 'release_alpha'
      - 'release_beta'
      - 'release_patch'
      - 'release_minor'
      - 'release_major'

permissions:
  contents: write
  pull-requests: write

jobs:
  increment_version_and_pr:
    uses: bcgov/bcrhp/.github/workflows/release_prep_common.yml@release/1.4.0_auto_deploy
    secrets:
      token: ${{ secrets.PROJECT_PAT }}
