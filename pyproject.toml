[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "bcrhp"
readme = "README.md"
authors = []
license = {text = "GNU AGPL3"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Framework :: Django",
    "Framework :: Django :: 4.2",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
]
requires-python = ">=3.10"
dependencies = [
    "arches @ git+https://github.com/bcgov/arches@7.6.12+bcgov.1",
    "bcgov-arches-common @ git+https://github.com/bcgov/bcgov-arches-common@brf/feat/add_goeom_dropzone",
    "arches-querysets[drf] @ git+https://github.com/archesproject/arches-querysets@dev/1.1.x",
    "arches-component-lab @ git+https://github.com/archesproject/arches-component-lab@main",
    "django-storages==1.13",
    "python-dotenv",
    "html2text",
    "oracledb",
]

version = "1.4.0"

[project.optional-dependencies]
dev = [
    "livereload",
    "sst",
    "coverage",
    "django-silk==5.1.0",
    "pre-commit==3.8.0",
    "black==24.4.2",
    "django-vite",
]

[tool.setuptools]
packages = ["bcrhp"]
